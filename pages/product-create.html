<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Product — InventoryPro</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="layout">
<aside class="sidebar">
  <div class="sidebar-brand"><div class="brand-icon"><i class="bi bi-boxes"></i></div><div><div class="brand-name">InventoryPro</div><div class="brand-sub">Management System</div></div></div>
  <nav class="nav-wrap">
    <div class="nav-label">Main</div>
    <a href="dashboard.html" class="nav-item"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <div class="nav-label">Inventory</div>
    <a href="products.html" class="nav-item active"><i class="bi bi-box-seam"></i> Products</a>
    <a href="categories.html" class="nav-item"><i class="bi bi-tag"></i> Categories</a>
    <a href="suppliers.html" class="nav-item"><i class="bi bi-truck"></i> Suppliers</a>
    <div class="nav-label">Transactions</div>
    <a href="purchases.html" class="nav-item"><i class="bi bi-cart-plus"></i> Purchases</a>
    <a href="sales.html" class="nav-item"><i class="bi bi-receipt"></i> Sales</a>
    <div class="nav-label">Reports</div>
    <a href="report-sales.html" class="nav-item"><i class="bi bi-graph-up"></i> Sales Report</a>
    <a href="report-profit.html" class="nav-item"><i class="bi bi-currency-dollar"></i> Profit Report</a>
    <a href="report-stock.html" class="nav-item"><i class="bi bi-bar-chart-line"></i> Stock Report</a>
    <div class="nav-label">System</div>
    <a href="alerts.html" class="nav-item"><i class="bi bi-bell"></i> Low Stock Alerts <span class="nav-badge">3</span></a>
    <a href="users.html" class="nav-item"><i class="bi bi-people"></i> Users</a>
    <a href="profile.html" class="nav-item"><i class="bi bi-person-circle"></i> My Profile</a>
    <a href="login.html" class="nav-item danger" style="margin-top:4px"><i class="bi bi-box-arrow-left"></i> Logout</a>
  </nav>
  <div class="sidebar-footer"><div class="user-av">A</div><div><div class="user-name">System Admin</div><div class="user-role">Admin</div></div></div>
</aside>

<div class="main">
  <header class="topbar">
    <div class="topbar-left"><h1 class="page-title">Add Product</h1></div>
    <div class="topbar-right"><span class="topbar-date"><i class="bi bi-calendar3" style="margin-right:5px;opacity:.5"></i><span id="topbarDate"></span></span><span class="role-badge role-admin">Admin</span></div>
  </header>
  <div class="page-body">

    <div style="max-width:660px;margin:0 auto">
    <div class="card">
      <div class="card-header">
        <div class="card-title"><i class="bi bi-plus-circle"></i> Add New Product</div>
        <a href="products.html" class="btn btn-ghost btn-sm"><i class="bi bi-arrow-left"></i> Back</a>
      </div>
      <div class="card-body">
        <form>
          <div class="form-row col-2">
            <div class="form-group"><label class="form-label">Product Name *</label><input type="text" name="name" class="form-control" placeholder="e.g. Samsung 55&quot; TV" required></div>
            <div class="form-group"><label class="form-label">SKU Code *</label><input type="text" name="sku" class="form-control" placeholder="e.g. ELEC-001" required></div>
          </div>
          <div class="form-row col-2">
            <div class="form-group"><label class="form-label">Category *</label>
              <select name="category_id" class="form-select" required>
                <option value="">— Select —</option>
                <option>Electronics</option><option>Clothing</option><option>Stationery</option>
              </select>
            </div>
            <div class="form-group"><label class="form-label">Unit</label>
              <select name="unit" class="form-select">
                <option>pcs</option><option>kg</option><option>ltr</option><option>box</option><option>ream</option><option>set</option>
              </select>
            </div>
          </div>
          <div class="form-row col-2">
            <div class="form-group"><label class="form-label">Selling Price (৳) *</label><input type="number" name="selling_price" class="form-control" step="0.01" min="0" placeholder="0.00" required></div>
            <div class="form-group"><label class="form-label">Low Stock Alert Qty</label><input type="number" name="low_stock_qty" class="form-control" value="10" min="1" required></div>
          </div>
          <div style="display:flex;gap:10px;margin-top:4px">
            <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Save Product</button>
            <a href="products.html" class="btn btn-ghost">Cancel</a>
          </div>
        </form>
      </div>
    </div>
    </div>
  </div>
</div>
</div>
<script src="../js/app.js" defer></script>
</body>
</html>
